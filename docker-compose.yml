services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: solitude
      POSTGRES_PASSWORD: solitude_dev
      POSTGRES_DB: city_solitude
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
